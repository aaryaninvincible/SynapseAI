services:
  - type: web
    name: synapse-agent
    runtime: docker
    rootDir: apps/agent
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GEMINI_LIVE_MODEL
        value: gemini-2.0-flash-live-001
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_API_KEY
        sync: false
      - key: GCP_PROJECT_ID
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
